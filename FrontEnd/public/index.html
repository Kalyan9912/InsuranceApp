<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>SecureLife Insurance Portal</title>

    <meta name="description"
        content="SecureLife Insurance Management System - Manage Policies, Claims, Customers and Premium Payments." />

    <meta name="keywords"
        content="Insurance, Policy Management, Claims, Premium Payments, Customer Portal" />

    <meta name="author" content="SecureLife Insurance" />

    <link rel="icon" href="%PUBLIC_URL%/favicon.ico" />

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap"
        rel="stylesheet">

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
        rel="stylesheet">

</head>

<body>

    <noscript>
        You need to enable JavaScript to run this application.
    </noscript>

    <!-- Loading Screen -->
    <div id="loading-screen"
        style="display:flex;justify-content:center;align-items:center;height:100vh;font-family:Roboto,sans-serif;">
        <div>
            <h2>SecureLife Insurance Portal</h2>
            <p>Loading Application...</p>
        </div>
    </div>

    <!-- React Root -->
    <div id="root"></div>

    <script>
        window.addEventListener('load', function () {
            const loader = document.getElementById('loading-screen');
            if (loader) {
                loader.style.display = 'none';
            }
        });
    </script>

</body>

</html>
